{% extends "base/base.html" %}

{% block content %}
<div x-data='gestionUsuarios({{ datos | tojson | safe }})' class="bg-white py-5 px-6 rounded-2xl shadow-lg border border-gray-300 flex flex-col gap-5 min-h-[calc(100vh-120px)] w-full relative">
    
    <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-5 w-full border-b border-gray-100 pb-4">
        
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-brand-blue shadow-sm flex-shrink-0">
                <i class="fas fa-user-shield text-2xl"></i>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Panel de administración de sistema</h2>
                <p class="text-gray-500 font-semibold text-sm">Gestión de departamentos, usuarios y credenciales.</p>
            </div>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full xl:w-max flex-shrink-0">
            
            <a href="{{ url_for('main.admin_logs_view') }}" class="w-full bg-slate-700 hover:bg-slate-900 text-white px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 border border-slate-700 whitespace-nowrap text-sm">
                <i class="fas fa-terminal text-emerald-400"></i> Ver logs
            </a>

            <button @click="modalDepartamento = true" class="w-full bg-gray-200 hover:bg-gray-300 text-slate-700 px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 border border-gray-200 whitespace-nowrap text-sm">
                <i class="fas fa-building text-brand-blue"></i> Nuevo Departamento
            </button>

            <button @click="abrirModalNuevo()" class="w-full bg-brand-blue hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 whitespace-nowrap text-sm">
                <i class="fas fa-user-plus"></i> Nuevo Usuario
            </button>
            
        </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-inner">
        <div class="w-full md:w-1/3">
            <label class="block text-sm font-bold text-gray-700 mb-1">Filtrar por Departamento</label>
            <select x-model="filtroDepartamento" class="w-full pl-3 pr-8 py-2.5 border-2 border-gray-300 rounded-lg text-slate-700 font-semibold focus:outline-none focus:border-brand-blue transition-colors">
                <option value="">Todos los departamentos</option>
                <template x-for="dept in data.departamentos" :key="dept.id_departamento">
                    <option :value="dept.id_departamento" x-text="dept.departamento"></option>
                </template>
            </select>
        </div>
        <div class="w-full md:w-2/3">
            <label class="block text-sm font-bold text-gray-700 mb-1">Buscar funcionario</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="text" x-model="busqueda" placeholder="Buscar por nombres, apellidos o cédula..." class="w-full pl-10 pr-3 py-2.5 border-2 border-gray-300 rounded-lg text-slate-700 font-semibold focus:outline-none focus:border-brand-blue transition-colors">
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-x-auto w-full border-2 border-gray-100 rounded-xl shadow-sm bg-white">
        <table class="w-full text-left border-collapse min-w-[850px]">
            <thead>
                <tr class="bg-brand-blue text-white text-sm uppercase tracking-wider text-center">
                    <th class="p-4 font-black border-b-2 border-brand-blue/80 text-left">Funcionario</th>
                    <th class="p-4 font-black border-b-2 border-brand-blue/80">Cédula</th>
                    <th class="p-4 font-black border-b-2 border-brand-blue/80">Departamento</th>
                    <th class="p-4 font-black border-b-2 border-brand-blue/80">Rol</th>
                    <th class="p-4 font-black border-b-2 border-brand-blue/80">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-center">
                <template x-for="usr in usuariosFiltrados" :key="usr.id_usuario">
                    <tr class="bg-white hover:bg-blue-50/50 transition-colors group">
                        <td class="p-4 text-left">
                            <div class="font-bold text-slate-800" x-text="usr.nombres + ' ' + usr.apellidos"></div>
                            <div class="text-[0.65rem] font-bold uppercase tracking-wider text-gray-400" x-text="usr.activo ? 'Cuenta Activa' : 'Cuenta Inactiva'"></div>
                        </td>
                        <td class="p-4 font-semibold text-gray-600" x-text="usr.cedula || 'S/N'"></td>
                        <td class="p-4">
                            <span class="bg-blue-50 border border-blue-100 text-brand-blue px-3 py-1.5 rounded-lg text-xs font-black uppercase tracking-wide shadow-sm inline-block w-max" x-text="usr.departamento"></span>
                        </td>
                        <td class="p-4 text-sm font-bold text-slate-600">
                            <span class="flex items-center justify-center gap-1.5">
                                <i class="fas" :class="usr.rol_privilegio === 'Administrador' ? 'fa-user-tie text-orange-500' : 'fa-user text-gray-400'"></i>
                                <span x-text="usr.rol_privilegio"></span>
                            </span>
                        </td>
                        <td class="p-4 align-middle">
                            <div x-show="!esAdminPrincipal(usr)" class="flex items-center justify-center gap-2">
                                <button type="button" @click="abrirModalEditar(usr)" title="Editar información del usuario" class="w-9 h-9 rounded-full bg-white text-brand-blue border-2 border-blue-100 hover:bg-brand-blue hover:text-white hover:border-brand-blue flex items-center justify-center transition-all shadow-sm">
                                    <i class="fas fa-pencil-alt text-sm"></i>
                                </button>
                                
                                <form action="{{ url_for('main.reset_password_admin') }}" method="POST" onsubmit="return confirm('¿Estás seguro de restablecer la contraseña a Default1? El usuario deberá cambiarla en su próximo inicio de sesión.');" class="inline m-0 p-0">
                                    <input type="hidden" name="id_usuario" :value="usr.id_usuario">
                                    <button type="submit" title="Forzar reseteo de contraseña (Default1)" class="w-9 h-9 rounded-full bg-white text-orange-500 border-2 border-orange-100 hover:bg-orange-500 hover:text-white hover:border-orange-500 flex items-center justify-center transition-all shadow-sm">
                                        <i class="fas fa-key text-sm"></i>
                                    </button>
                                </form>
                            </div>

                            <div x-show="esAdminPrincipal(usr)" style="display: none;" class="flex items-center justify-center">
                                <span class="text-[10px] uppercase tracking-widest font-black text-orange-600 bg-orange-100 px-3 py-1.5 rounded-lg border border-orange-200 flex items-center gap-1.5 shadow-sm">
                                    <i class="fas fa-shield-alt"></i> Protegido
                                </span>
                            </div>
                        </td>
                    </tr>
                </template>
                <tr x-show="usuariosFiltrados.length === 0">
                    <td colspan="5" class="p-8 text-center">
                        <div class="flex flex-col items-center justify-center text-gray-400">
                            <i class="fas fa-search text-3xl mb-3 opacity-50"></i>
                            <p class="font-bold text-lg">No se encontraron resultados</p>
                            <p class="text-sm">Intenta con otra búsqueda o filtro departamental.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <template x-teleport="body">
        <div x-show="modalDepartamento" style="display: none;" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-opacity">
            <div @click.away="modalDepartamento = false" class="bg-white rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-md transform transition-all m-4">
                
                <div class="flex items-center justify-between border-b border-gray-100 pb-4 mb-5">
                    <h3 class="text-xl font-black text-slate-800 flex items-center gap-3">
                        <i class="fas fa-building text-brand-blue text-2xl"></i>
                        Nuevo Departamento
                    </h3>
                    <button @click="modalDepartamento = false" class="text-gray-400 hover:text-red-500 transition-colors bg-gray-100 p-2 rounded-full h-8 w-8 flex items-center justify-center">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <form action="{{ url_for('main.nuevo_departamento') }}" method="POST" class="flex flex-col gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nombre del Departamento</label>
                        <input type="text" name="departamento" required placeholder="Ej. Recursos Humanos" class="w-full pl-3 py-3 border-2 border-gray-300 rounded-xl text-slate-700 font-semibold focus:outline-none focus:border-brand-blue transition-colors">
                    </div>
                    
                    <div class="flex gap-3 mt-2">
                        <button type="button" @click="modalDepartamento = false" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors">Cancelar</button>
                        <button type="submit" class="flex-1 py-3 bg-brand-blue hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </template>

    <template x-teleport="body">
        <div x-show="modalUsuario" style="display: none;" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-opacity">
            <div @click.away="modalUsuario = false" class="bg-white rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-2xl transform transition-all m-4 max-h-[90vh] flex flex-col">
                
                <div class="flex items-center justify-between border-b border-gray-100 pb-4 mb-5 flex-shrink-0">
                    <h3 class="text-2xl font-black text-slate-800 flex items-center gap-3" x-html="modoEdicion ? '<i class=\'fas fa-user-edit text-brand-blue text-2xl\'></i> Editar funcionario' : '<i class=\'fas fa-user-plus text-brand-blue text-2xl\'></i> Nuevo funcionario'"></h3>
                    <button @click="modalUsuario = false" class="text-gray-400 hover:text-red-500 transition-colors bg-gray-100 p-2 rounded-full h-8 w-8 flex items-center justify-center">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="overflow-y-auto custom-scrollbar pr-2 flex-1">
                    <div x-show="!modoEdicion" class="flex items-center gap-3 text-md text-brand-blue font-bold bg-blue-50 p-3.5 rounded-xl mb-6 border border-blue-100 shadow-sm">
                        <i class="fas fa-info-circle text-xl"></i>
                        <p>Al crear el usuario, se le asignará la clave temporal <strong>Default1</strong> y el sistema le solicitará cambiarla inmediatamente.</p>
                    </div>
                    
                    <form :action="modoEdicion ? '{{ url_for('main.editar_usuario') }}' : '{{ url_for('main.nuevo_usuario') }}'" method="POST" class="flex flex-col gap-4">
                        <input type="hidden" name="id_usuario" x-model="formUser.id_usuario">

                        <div x-show="esSuperAdmin" class="flex items-center gap-3 text-sm text-orange-600 font-bold bg-orange-50 p-3.5 rounded-xl border border-orange-200 shadow-sm">
                            <i class="fas fa-shield-alt text-xl"></i>
                            <p>El perfil del Administrador principal está protegido. No se pueden modificar sus datos base.</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Nombres</label>
                                <input type="text" name="nombres" x-model="formUser.nombres" required 
                                       :disabled="esSuperAdmin"
                                       :class="esSuperAdmin ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:border-brand-blue border-gray-300'"
                                       class="w-full px-4 py-2.5 border-2 rounded-xl font-semibold outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Apellidos</label>
                                <input type="text" name="apellidos" x-model="formUser.apellidos" required 
                                       :disabled="esSuperAdmin"
                                       :class="esSuperAdmin ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:border-brand-blue border-gray-300'"
                                       class="w-full px-4 py-2.5 border-2 rounded-xl font-semibold outline-none transition-colors">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">Cédula de Identidad</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <i class="fas fa-id-card text-gray-400"></i>
                                </div>
                                <input type="text" name="cedula" maxlength="10" x-model="formUser.cedula" 
                                    @input="formUser.cedula = $event.target.value.replace(/[^0-9]/g, '')"
                                    pattern="\d*"
                                    title="Ingrese únicamente números"
                                    :disabled="esSuperAdmin"
                                    :class="esSuperAdmin ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:border-brand-blue border-gray-300'"
                                    class="w-full pl-11 pr-4 py-2.5 border-2 rounded-xl font-semibold outline-none transition-colors">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Departamento</label>
                                <select name="id_departamento" required x-model="formUser.id_departamento" 
                                        :disabled="esSuperAdmin"
                                        :class="esSuperAdmin ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:border-brand-blue border-gray-300'"
                                        class="w-full px-4 py-2.5 border-2 rounded-xl font-semibold outline-none transition-colors appearance-none">
                                    <option value="">Seleccione...</option>
                                    <template x-for="dept in data.departamentos" :key="dept.id_departamento">
                                        <option :value="dept.id_departamento" x-text="dept.departamento"></option>
                                    </template>
                                </select>
                                <input x-show="esSuperAdmin" type="hidden" name="id_departamento" :value="formUser.id_departamento">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Privilegios en el sistema</label>
                                <select name="id_rol" required x-model="formUser.id_rol" 
                                        :disabled="esSuperAdmin"
                                        :class="esSuperAdmin ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'bg-white focus:border-brand-blue border-gray-300'"
                                        class="w-full px-4 py-2.5 border-2 rounded-xl font-semibold outline-none transition-colors appearance-none relative z-10">
                                    <option value="">Seleccione...</option>
                                    <template x-for="rol in data.roles" :key="rol.id_rol">
                                        <option :value="rol.id_rol" x-text="rol.rol_privilegio === 'Usuario' ? rol.rol_privilegio + ' (Funciones exp.)' : rol.rol_privilegio"></option>
                                    </template>
                                </select>
                                
                                <input x-show="esSuperAdmin" type="hidden" name="id_rol" :value="formUser.id_rol">

                                <div x-show="data.roles.find(r => r.id_rol == formUser.id_rol)?.rol_privilegio === 'Usuario'"
                                    x-transition:enter="transition ease-out duration-300"
                                    x-transition:enter-start="opacity-0 -translate-y-2"
                                    x-transition:enter-end="opacity-100 translate-y-0"
                                    class="mt-2 flex items-center gap-2 px-3 py-2 bg-purple-50 border border-purple-200 rounded-lg shadow-sm"
                                    style="display: none;">
                                    <i class="fa-solid fa-flask text-purple-700"></i>
                                    <span class="text-xs font-bold text-purple-800 uppercase tracking-wide">
                                        Solo funciones experimentales
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-3 border-t border-gray-100 pt-5 mt-2 flex-shrink-0">
                            <button type="button" @click="modalUsuario = false" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors">
                                <span x-text="esSuperAdmin ? 'Cerrar' : 'Cancelar'"></span>
                            </button>
                            <button type="submit" 
                                    x-show="!esSuperAdmin"
                                    class="flex-1 py-3 bg-brand-blue hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
                                <i class="fas fa-save"></i> <span x-text="modoEdicion ? 'Actualizar Información' : 'Crear Usuario'"></span>
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </template>

</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('gestionUsuarios', (serverData) => ({
            data: serverData,
            filtroDepartamento: '',
            busqueda: '',
            
            // Estados Modales
            modalDepartamento: false,
            modalUsuario: false,
            modoEdicion: false,
            
            // Modelo reactivo para el formulario
            formUser: {
                id_usuario: '', nombres: '', apellidos: '', cedula: '', id_departamento: '', id_rol: ''
            },

            // Nueva propiedad: Verifica si el usuario actual en edición es el super admin
            get esSuperAdmin() {
                // Aquí lo hacemos por nombre como solicitaste:
                return this.modoEdicion && 
                       this.formUser.nombres.trim().toLowerCase() === 'admin' && 
                       this.formUser.apellidos.trim().toLowerCase() === 'admin';
            },

            // Filtro dinámico para la tabla
            get usuariosFiltrados() {
                return this.data.usuarios.filter(usr => {
                    const cumpleDept = this.filtroDepartamento === '' || usr.id_departamento.toString() === this.filtroDepartamento.toString();
                    const busquedaMinus = this.busqueda.toLowerCase();
                    const nombreCompleto = `${usr.nombres} ${usr.apellidos}`.toLowerCase();
                    const cumpleBusqueda = this.busqueda === '' || nombreCompleto.includes(busquedaMinus) || (usr.cedula && usr.cedula.includes(busquedaMinus));
                    return cumpleDept && cumpleBusqueda;
                });
            },

            // Nueva función para evaluar cada fila de la tabla
            esAdminPrincipal(usr) {
                if (!usr || !usr.nombres || !usr.apellidos) return false;
                return usr.nombres.trim().toLowerCase() === 'admin' && 
                       usr.apellidos.trim().toLowerCase() === 'admin';
            },

            abrirModalNuevo() {
                this.modoEdicion = false;
                this.formUser = { id_usuario: '', nombres: '', apellidos: '', cedula: '', id_departamento: '', id_rol: '' };
                this.modalUsuario = true;
            },

            abrirModalEditar(usr) {
                this.modoEdicion = true;
                this.formUser = {
                    id_usuario: usr.id_usuario,
                    nombres: usr.nombres,
                    apellidos: usr.apellidos,
                    cedula: usr.cedula,
                    id_departamento: usr.id_departamento,
                    id_rol: usr.id_rol
                };
                this.modalUsuario = true;
            }
        }));
    });
</script>
{% endblock %}
