<div x-data="{ isLoading: false, loadingMessage: 'Procesando...' }"
     @show-loading.window="isLoading = true; loadingMessage = $event.detail.message || 'Procesando...'"
     @hide-loading.window="isLoading = false"
     x-show="isLoading"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[999999] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center pointer-events-auto"
     style="display: none;">
    
    <div class="relative w-24 h-24 mb-6">
        <div class="absolute inset-0 border-8 border-slate-700 border-t-brand-blue rounded-full animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center text-white">
            <i class="fas fa-microchip text-3xl animate-pulse text-brand-blue text-blue-200"></i>
        </div>
    </div>
    
    <h2 class="text-3xl font-black text-white tracking-wide text-center" x-text="loadingMessage"></h2>
    
    <p class="text-white mt-3 font-bold">Por favor, no cierres esta ventana</p>
</div>
