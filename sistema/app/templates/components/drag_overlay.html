<div x-data="{ globalDrag: false }"
     @global-drag-enter.window="globalDrag = true"
     @global-drag-leave.window="globalDrag = false"
     x-show="globalDrag" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[60] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center m-4 rounded-3xl border-4 border-dashed border-brand-blue pointer-events-none"
     style="display: none;">
    <div class="flex flex-col items-center text-white transform scale-110">
        <i class="fas fa-file-upload text-7xl text-brand-blue mb-4"></i>
        <h2 class="text-4xl font-black tracking-wide">¡Suelta el archivo aquí!</h2>
    </div>
</div>
