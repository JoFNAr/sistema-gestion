<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de gestión</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <!-- Tailwind CSS -->
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
    <!-- Animations -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    
    <script>
        // Prevenir carga desde caché al usar flechas del navegador
        window.onpageshow = function(event) {
            if (event.persisted) window.location.reload();
        };
    </script>
    <script>
    tailwind.config = {
        theme: {
        extend: {
            colors: {
            // Paleta personalizada
            'brand-blue': '#417EE0',   // Botones y acentos
            'brand-gray': '#54637A',   // Textos secundarios
            }
        }
        }
    }
    </script>
</head>
<body class="bg-gray-300 h-screen flex overflow-hidden">

    <!-- SECCIÓN IZQUIERDA: Columna de Login -->
    <div class="w-full lg:w-2/5 bg-white flex flex-col justify-center px-8 md:px-24 shadow-2xl z-10 animate-slide-left relative">

        <div class="absolute top-2 left-2 md:top-3 md:left-3">
            <img src="{{ url_for('static', filename='img/logo-MSP-PUCE.png') }}" 
                 alt="Logo MSP PUCE" 
                 class="h-16 w-auto object-contain">
        </div>

        <div class="w-full max-w-md mx-auto">
        <!-- Bloque de Título Centrado -->
            <div class="mb-8 text-center">
                <h2 class="text-4xl font-bold text-slate-800 mb-6">Sistema de gestión</h2>
                <p class="font-semibold text-slate-800">Bienvenido, por favor ingresa tus credenciales.</p>
            </div>
        <!-- Bloque para mensaje de cambio de clave -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                    <div class="bg-green-100 border-l-4 border-green-500 p-3 mb-6 w-full animate-fade-in">
                        <p class="font-bold text-green-800 text-md flex items-center justify-center">
                            <i class="fas fa-check-circle mr-2"></i> {{ message }}
                        </p>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <!-- Bloque de Error Centrado -->
            {% if error %}
            <div class="bg-red-100 border-l-4 border-red-600 p-3 mb-6 w-full animate-pulse">
                <p class="font-bold text-red-800 text-md flex items-center justify-center">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
                </p>
            </div>
            {% endif %}

            <!-- Formulario -->
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6 w-full max-w-md mx-auto">
                <div>
                    <label class="block text-md font-bold text-slate-700 mb-2">Usuario o cédula</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-brand-blue">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" name="username" 
                            class="bg-gray-200 border border-gray-300 shadow-md text-md font-bold text-slate-900 w-full pl-10 pr-4 py-3 rounded-lg focus:ring-2 focus:ring-brand-blue focus:bg-white outline-none transition placeholder-slate-400"
                            placeholder="Ingresa tu identificación" required pattern="^[a-zA-Z0-9 ]+$">
                    </div>
                </div>

                <div>
                    <label class="block text-md font-bold text-slate-700 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-brand-blue">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" 
                            class="bg-gray-200 border border-gray-300 shadow-md text-md font-bold text-slate-900 w-full pl-10 pr-4 py-3 rounded-lg focus:ring-2 focus:ring-brnad-blue focus:bg-white outline-none transition placeholder-slate-400"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-brand-blue hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg shadow-blue-900/20">
                    Iniciar sesión
                </button>
            </form>
        </div>

        <!-- Pie de página -->
        <p class="absolute bottom-6 left-0 right-0 text-slate-500 text-xs text-center">
            &copy; 2026 Sistema de gestión.
        </p>
    </div>

    <!-- SECCIÓN DERECHA: Imagen de Fondo -->
    <div class="hidden lg:block lg:flex-1 relative animate-slide-left">
        <div class="absolute inset-0 bg-blue-900/20 z-0"></div>
        <img src="{{ url_for('static', filename='img/login_bg.jpg') }}" 
             alt="Background" 
             class="absolute inset-0 w-full h-full object-cover">
    </div>

</body>
</html>
